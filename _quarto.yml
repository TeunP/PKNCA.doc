project:
  type: book
  output-dir: _book

book:
  title: "PKNCA: Noncompartmental Analysis in R"
  author: "Teun M. Post"
  date: today
  description: "A comprehensive guide to the PKNCA R package (≥ 0.12.2) — covering every function, parameter, and workflow with runnable examples."
  repo-url: https://github.com/humanpred/pknca
  repo-actions: [issue]
  favicon: ""
  chapters:
    - index.qmd
    - part: "User Guide"
      chapters:
        - user/workflow.qmd
        - user/intervals.qmd
        - user/auc-methods.qmd
        - user/halflife.qmd
        - user/extravascular.qmd
        - user/intravascular.qmd
        - user/multiple-dose.qmd
        - user/urine-excretion.qmd
        - user/sparse.qmd
        - user/superposition.qmd
        - user/tss.qmd
        - user/postprocessing.qmd
        - user/units.qmd
        - user/imputation.qmd
        - user/dose-aware-interpolation.qmd
        - user/custom-parameters.qmd
        - user/utilities.qmd
        - user/regulatory.qmd
        - user/validation.qmd
    - part: "Developer Reference"
      chapters:
        - dev/function-deps.qmd
        - dev/architecture.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-tools: true
    highlight-style: github

execute:
  freeze: false
  warning: true
  error: false
