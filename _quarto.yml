project:
  type: website
  output-dir: _site

website:
  title: "PKNCA Documentation"
  description: "User and developer reference for the PKNCA R package"
  navbar:
    left:
      - href: index.qmd
        text: Overview
    right:
      - icon: github
        href: https://github.com/humanpred/pknca
  sidebar:
    style: docked
    contents:
      - section: "User Guide"
        contents:
          - user/workflow.qmd
          - user/intravascular.qmd
          - user/extravascular.qmd
          - user/sparse.qmd
          - user/auc-methods.qmd
          - user/halflife.qmd
          - user/postprocessing.qmd
          - user/multiple-dose.qmd
          - user/urine-excretion.qmd
          - user/superposition.qmd
          - user/tss.qmd
          - user/utilities.qmd
          - user/dose-aware-interpolation.qmd
          - user/custom-parameters.qmd
      - section: "Developer"
        contents:
          - dev/function-deps.qmd
          - dev/architecture.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-tools: true
    highlight-style: github

execute:
  freeze: false
  warning: true
  error: false
